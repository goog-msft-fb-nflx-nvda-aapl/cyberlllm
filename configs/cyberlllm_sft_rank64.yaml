### Model
model_name_or_path: /home/jtan/llm/models/Qwen2.5-7B-Instruct
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: cyberlllm_sft_train
template: qwen
cutoff_len: 2048
overwrite_cache: false
preprocessing_num_workers: 16

### Output
output_dir: saves/cyberlllm_sft_rank64
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
report_to: none

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
gradient_checkpointing: true

### Eval
val_size: 0.05
per_device_eval_batch_size: 4
eval_strategy: steps
eval_steps: 200
